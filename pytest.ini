[pytest]
# Test discovery
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Python path configuration
pythonpath = src

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    -ra

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions/classes
    integration: Integration tests requiring file I/O or multiple modules
    tdf_required: Tests requiring .tdf asset files (skipped if missing)
    slow: Tests that take significant time to run
    pytorch: Tests requiring PyTorch and GPU resources

# Timeout configuration (requires pytest-timeout)
timeout = 300
timeout_method = thread
